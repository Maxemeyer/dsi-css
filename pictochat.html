<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pictochat Webtest</title>

    <script src="assets/JS/pictochat.js" defer></script>

    <link rel="stylesheet" href="assets/CSS/pictochat.css">
  </head>
  <body>
    <fieldset class="chatInput">
      <legend>
        <span class="syncInputWidth"></span>

        <input type="text" class="usernameInput" maxlength="10" spellcheck="false" placeholder="Username" aria-label="pictochat username input">
      </legend>

      <canvas id="canvas"></canvas>

      <textarea id="textarea" rows="5" spellcheck="false" aria-label="pictochat message textarea"></textarea>
    </fieldset>

    <div id="toolbar">
      <label>
        <input class="tbInputs" type="radio" id="stateTextarea" name="fieldsetState" checked>
        Textarea
      </label>

      <label>
        <input class="tbInputs" type="checkbox" id="color">
        Color
      </label>

      <label>
        <input class="tbInputs" type="radio" id="lineWidth" name="lineWidth" checked>
        Normal
      </label>

      <button class="tbButton" id="clear">CLEAR</button>

      <label>
        <input class="tbInputs" type="radio" id="stateCanvas" name="fieldsetState">
        Canvas
      </label>

      <label>
        <input class="tbInputs" type="checkbox" id="eraser">
        Eraser
      </label>

      <label>
        <input class="tbInputs" type="radio" name="lineWidth">
        Bold
      </label>

      <button class="tbButton" id="submit">SEND</button>
    </div>
  </body>
</html>
